server {
    listen 3456;
    server_name wpp.eidosform.com.br;

    # Log access and errors
    access_log /var/log/nginx/eidosform-whatsapp-access.log;
    error_log /var/log/nginx/eidosform-whatsapp-error.log;

    # Increase buffer sizes for large headers
    client_body_buffer_size 128k;
    client_max_body_size 10M;

    location / {
        # Proxy all requests to the WhatsApp API server
        proxy_pass http://127.0.0.1:3456;

        # Forward all headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if wacli/whatsmeow adds it later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Handle CORS if needed
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
    }
}
